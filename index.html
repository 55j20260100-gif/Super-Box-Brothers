<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>スーパー・ボックス・ブラザーズ 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none; -webkit-user-select:none; -webkit-touch-callout:none; }
  html, body {
    position:fixed; inset:0;
    width:100%; height:100%; overflow:hidden;
    background:#000;
    font-family: 'Press Start 2P', monospace;
    overscroll-behavior: none;
    touch-action:none;
  }
  @supports (height: 100dvh) {
    html, body { height:100dvh; }
  }
  #gameCanvas {
    display:block;
    width:100vw; height:100vh;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    touch-action: none;
  }
  #hud {
    position:fixed; top:0; left:0; width:100%; padding:12px 14px;
    display:flex; justify-content:space-between; align-items:flex-start;
    color:#FCFCFC; text-shadow: 3px 3px 0 #000;
    font-size:12px; pointer-events:none; z-index:10;
    letter-spacing:1px;
  }
  #hud .stat { margin-bottom:7px; }
  #hud .coin-icon { color:#FCD800; }
  #stageLabel { font-size:11px; color:#FCD800; margin-bottom:6px; }
  #controls-hint {
    position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    color:#FCFCFC; text-shadow: 2px 2px 0 #000; font-size:8px;
    opacity:0.85; pointer-events:none; text-align:center; z-index:10;
    line-height:1.8;
  }
  #overlay {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:30;
    background: radial-gradient(circle at center, rgba(20,20,60,0.85), rgba(0,0,0,0.92));
    color:#FCFCFC; text-align:center; padding:20px;
  }
  #overlay h1 {
    font-size:22px; color:#FCD800; text-shadow: 4px 4px 0 #E40000;
    margin-bottom:22px; line-height:1.6;
  }
  #overlay h2 {
    font-size:18px; color:#00E430; text-shadow: 4px 4px 0 #005818;
    margin-bottom:16px;
  }
  #overlay p { font-size:10px; line-height:2.2; margin-bottom:8px; color:#CFEAFF; }
  #fadeFlash {
    position:fixed; inset:0; background:#FCFCFC; opacity:0; pointer-events:none; z-index:15;
  }
  #stageBanner {
    position:fixed; top:40%; left:50%; transform:translate(-50%,-50%);
    font-size:20px; color:#FCD800; text-shadow:4px 4px 0 #000;
    z-index:25; opacity:0; pointer-events:none; text-align:center; line-height:2;
    transition: opacity 0.4s;
    animation: bannerBounce 2s ease-in-out infinite alternate;
  }
  @keyframes bannerBounce {
    from { transform: translate(-50%, -55%); }
    to { transform: translate(-50%, -45%); }
  }

  /* touch controls -- sized/positioned with clamp() + safe-area so layout adapts to any screen size */
  #touchControls { position:fixed; inset:0; z-index:12; pointer-events:none; display:none; }
  /* Ensure all interactive UI elements are above the touch layer and have pointer-events auto */
  #hud, #pauseBtn, #overlay { pointer-events: auto; }
  .menuBtn { pointer-events: auto; position: relative; z-index: 35; }
  #joystickBase {
    position:absolute;
    left: calc(env(safe-area-inset-left, 0px) + clamp(14px, 4vw, 32px));
    bottom: calc(env(safe-area-inset-bottom, 0px) + clamp(14px, 4vh, 34px));
    width:clamp(88px, 24vmin, 130px); height:clamp(88px, 24vmin, 130px);
    border-radius:50%; background:rgba(255,255,255,0.15); border:3px solid rgba(255,255,255,0.5);
    pointer-events:auto; touch-action:none;
  }
  #joystickStick {
    position:absolute; left:22%; top:22%; width:56%; height:56%; border-radius:50%;
    background:rgba(255,255,255,0.55); border:3px solid rgba(255,255,255,0.8);
    pointer-events:none;
  }
  #jumpBtn {
    position:absolute;
    right: calc(env(safe-area-inset-right, 0px) + clamp(18px, 5vw, 36px));
    bottom: calc(env(safe-area-inset-bottom, 0px) + clamp(18px, 5vh, 40px));
    width:clamp(68px, 20vmin, 96px); height:clamp(68px, 20vmin, 96px); border-radius:50%;
    background:rgba(228,0,0,0.45); border:3px solid rgba(255,255,255,0.7);
    color:#fff; font-size:clamp(9px, 2.6vmin, 12px); display:flex; align-items:center; justify-content:center;
    pointer-events:auto; touch-action:none; text-shadow:2px 2px 0 #000;
  }
  #jumpBtn:active { background:rgba(228,0,0,0.75); }
  #fireBtn {
    position:absolute;
    right: calc(env(safe-area-inset-right, 0px) + clamp(90px, 24vmin, 130px));
    bottom: calc(env(safe-area-inset-bottom, 0px) + clamp(18px, 5vh, 40px));
    width:clamp(56px, 16vmin, 78px); height:clamp(56px, 16vmin, 78px); border-radius:50%;
    background:rgba(248,56,0,0.45); border:3px solid rgba(255,255,255,0.7);
    color:#fff; font-size:clamp(8px, 2.2vmin, 11px); display:flex; align-items:center; justify-content:center;
    pointer-events:auto; touch-action:none; text-shadow:2px 2px 0 #000;
    opacity:0.35; transition:opacity 0.2s;
  }
  #fireBtn:active { background:rgba(248,56,0,0.75); }
  #camHint {
    position:absolute; top: calc(env(safe-area-inset-top, 0px) + 16px); left:50%; transform:translateX(-50%);
    font-size:8px; color:rgba(255,255,255,0.7); text-shadow:2px 2px 0 #000;
    text-align:center;
  }
  /* short/landscape phones: pull controls in closer so they stay reachable */
  @media (max-height: 420px) {
    #joystickBase { bottom: calc(env(safe-area-inset-bottom, 0px) + 8px); left: calc(env(safe-area-inset-left, 0px) + 8px); }
    #jumpBtn { bottom: calc(env(safe-area-inset-bottom, 0px) + 10px); right: calc(env(safe-area-inset-right, 0px) + 12px); }
    #fireBtn { bottom: calc(env(safe-area-inset-bottom, 0px) + 10px); }
  }

  #pauseBtn {
    position:fixed; z-index:11;
    top: calc(env(safe-area-inset-top, 0px) + clamp(10px, 2.5vh, 18px));
    right: calc(env(safe-area-inset-right, 0px) + clamp(10px, 2.5vw, 20px));
    width:clamp(38px, 9vmin, 50px); height:clamp(38px, 9vmin, 50px);
    background:rgba(0,0,0,0.45); border:2px solid rgba(255,255,255,0.75); border-radius:8px;
    color:#FCFCFC; font-size:clamp(14px, 3.4vmin, 18px); line-height:1;
    display:none; align-items:center; justify-content:center; cursor:pointer;
    pointer-events:auto;
  }
  #pauseBtn:active { background:rgba(0,0,0,0.7); }

  .menuBtnRow { display:flex; flex-direction:column; align-items:center; gap:14px; margin-top:22px; }
  .menuBtn {
    font-family:'Press Start 2P', monospace;
    font-size:11px; padding:12px 24px; cursor:pointer;
    background:#E40000; color:#FCFCFC; border:4px solid #FCFCFC;
    box-shadow: 5px 5px 0 #000;
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: floatBtn 3s ease-in-out infinite;
  }
  .menuBtn:hover {
    transform: scale(1.1);
    background: #FF3030;
    box-shadow: 8px 8px 0 #000;
  }
  .menuBtn:active { transform: scale(0.95) translate(2px,2px); box-shadow: 2px 2px 0 #000; }
  
  @keyframes floatBtn {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  
  #overlay {
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:30;
    background: radial-gradient(circle at center, rgba(20,20,60,0.85), rgba(0,0,0,0.92));
    color:#FCFCFC; text-align:center; padding:20px;
    animation: fadeIn 0.5s ease-out;
  }
  
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(1.1); }
    to { opacity: 1; transform: scale(1); }
  }
  .menuBtn.secondary { background:#0058F8; }
  .menuBtn.tertiary { background:#585858; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="hud" style="display:none;">
  <div>
    <div id="stageLabel">STAGE 1</div>
    <div class="stat">SCORE<br><span id="scoreVal">000000</span></div>
    <div class="stat" id="statusVal" style="color:#FCD800;"></div>
  </div>
  <div>
    <div class="stat" style="text-align:right;"><span class="coin-icon">&#9673;</span> x <span id="coinVal">00</span></div>
    <div class="stat" style="text-align:right;">LIFE <span id="lifeVal">x3</span></div>
  </div>
</div>

<button id="pauseBtn" aria-label="ポーズ">&#10074;&#10074;</button>

<div id="controls-hint" style="display:none;">
  &#8592; &#8594; &#8593; &#8595; / WASD : 移動　　SPACE : ジャンプ　　F : ファイア　　ドラッグ : カメラ回転　　ESC/P : ポーズ
</div>

<div id="touchControls">
  <div id="camHint">画面右側をドラッグしてカメラ回転</div>
  <div id="joystickBase"><div id="joystickStick"></div></div>
  <div id="fireBtn">FIRE</div>
  <div id="jumpBtn">JUMP</div>
</div>

<div id="stageBanner"></div>
<div id="fadeFlash"></div>

<div id="overlay"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  // ============ LOCK SCREEN (prevent scroll / zoom / gestures) ============
  document.addEventListener('touchmove', function(e){ e.preventDefault(); }, {passive:false});
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('gesturechange', function(e){ e.preventDefault(); });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  let lastTouchEnd = 0;
  document.addEventListener('touchend', function(e){
    const now = Date.now();
    if(now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, {passive:false});
  window.addEventListener('scroll', ()=>{ window.scrollTo(0,0); });

  // ============ RETRO PALETTE / THEMES ============
  const STAGE_THEMES = [
    { name:'グラスランド', sky:0x5C94FC, ground:0x00A800, groundSide:0x784800, block:0xFCBC00, blockDark:0xC87800, stars:false, lava:false },
    { name:'サンドデザート', sky:0xFCE0A0, ground:0xE8C468, groundSide:0xA87830, block:0xD88030, blockDark:0xA85818, stars:false, lava:false },
    { name:'ナイトスカイ', sky:0x0818A0, ground:0x6858C0, groundSide:0x302868, block:0xB0A0FC, blockDark:0x7868C8, stars:true, lava:false },
    { name:'キャッスル', sky:0x100810, ground:0x585858, groundSide:0x282828, block:0xB03018, blockDark:0x781808, stars:false, lava:true }
  ];
  const STAGE_DIFFICULTY = [
    { segCount:14, enemyChance:0.22, heightMin:-2, heightMax:8,  widthMin:4.5 },
    { segCount:18, enemyChance:0.32, heightMin:-3, heightMax:9,  widthMin:4.0 },
    { segCount:22, enemyChance:0.40, heightMin:-3, heightMax:11, widthMin:3.6 },
    { segCount:26, enemyChance:0.48, heightMin:-4, heightMax:12, widthMin:3.2 }
  ];
  const TOTAL_STAGES = STAGE_THEMES.length;

  const PALETTE = {
    coin: 0xFCD800,
    flagPole: 0xC0C0C0,
    flag: 0x00E430,
    playerRed: 0xE40000,
    playerBlue: 0x0058F8,
    playerSkin: 0xFCA044,
    playerBrown: 0x904818,
    enemyBody: 0x904818,
    enemyDark: 0x582808,
    enemyFoot: 0x402008,
    mushroomCap: 0xE40000,
    mushroomSpot: 0xFCFCFC,
    mushroomStem: 0xFCD8A0,
    oneUpCap: 0x00A800,
    starCore: 0xFCD800,
    starGlow: 0xFCE870,
    turtleShell: 0x30B840,
    turtleShellDark: 0x1C7828,
    turtleBelly: 0xFCE8B0,
    turtleSkin: 0x78D858,
    brick: 0xC84C0C,
    brickDark: 0x702000,
    question: 0xFCBC00,
    emptyBlock: 0x787878,
    fireFlowerStem: 0x00A800,
    fireFlowerCenter: 0xFCD800,
    fireFlowerPetal: 0xF83800,
    fireballColor: 0xFF6000
  };

  // ============ RENDERER / SCENE / CAMERA ============
  const canvas = document.getElementById('gameCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias:false });

  const scene = new THREE.Scene();

  renderer.setClearColor(STAGE_THEMES[0].sky);

  const camera = new THREE.PerspectiveCamera(62, 1, 0.1, 300);

  const PIXEL_SCALE = 0.32;
  function resize(){
    const w = window.innerWidth, h = window.innerHeight;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    const iw = Math.max(160, Math.floor(w * PIXEL_SCALE));
    const ih = Math.max(120, Math.floor(h * PIXEL_SCALE));
    renderer.setPixelRatio(1);
    renderer.setSize(iw, ih, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', ()=>{ setTimeout(resize, 150); });
  if(window.visualViewport){
    // keeps the canvas correctly sized when mobile browser chrome (address bar) shows/hides
    window.visualViewport.addEventListener('resize', resize);
    window.visualViewport.addEventListener('scroll', ()=>{ window.scrollTo(0,0); });
  }

  // ============ LIGHTING ============
  const ambient = new THREE.AmbientLight(0xffffff, 0.75);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xfff2d0, 0.9);
  sun.position.set(20, 30, 10);
  scene.add(sun);
  const lavaLight = new THREE.PointLight(0xff3018, 0, 30);
  lavaLight.position.set(0,2,0);
  scene.add(lavaLight);

  function mat(color){ return new THREE.MeshLambertMaterial({ color: color }); }

  // ============ STARS / HILLS ============




  // ============ LEVEL STATE ============
  let platforms = [];
  let coins = [];
  let enemies = [];
  let items = [];
  let platformMeshes = [];
  let blocks = []; // New array for interactive blocks
  let fireballs = []; // Player-shot fireballs
  let goalPos = null;
  let poleGroup = null;
  let levelStartZ = 6;

  function clearLevel(){
    platformMeshes.forEach(m=>scene.remove(m));
    coins.forEach(c=>scene.remove(c.mesh));
    enemies.forEach(e=>scene.remove(e.mesh));
    items.forEach(it=>scene.remove(it.mesh));
    blocks.forEach(b=>scene.remove(b.mesh));
    fireballs.forEach(f=>scene.remove(f.mesh));
    if(poleGroup) scene.remove(poleGroup);
    platforms = []; coins = []; enemies = []; items = []; platformMeshes = []; blocks = []; fireballs = [];
  }

  function addPlatform(x,y,z,w,h,d, colorTop, colorSide){
    const geo = new THREE.BoxGeometry(w,h,d);
    const materials = [
      mat(colorSide), mat(colorSide),
      mat(colorTop), mat(colorSide),
      mat(colorSide), mat(colorSide)
    ];
    const mesh = new THREE.Mesh(geo, materials);
    mesh.position.set(x,y,z);
    scene.add(mesh);
    const plat = {
      minX:x-w/2, maxX:x+w/2,
      minZ:z-d/2, maxZ:z+d/2,
      topY: y+h/2, bottomY: y-h/2, w:w, h:h, d:d,
      type: 'solid'
    };
    platforms.push(plat);
    platformMeshes.push(mesh);
    return plat;
  }

  // decides what a question block will contain, weighted toward common items
  function pickBlockItem(){
    const r = Math.random();
    if(r < 0.55) return 'coin';
    if(r < 0.70) return 'mushroom';
    if(r < 0.80) return 'fireflower';
    if(r < 0.90) return 'star';
    if(r < 0.96) return 'shell';
    return 'oneup';
  }

  function addBlock(x,y,z, type){
    const geo = new THREE.BoxGeometry(1,1,1);
    let color;
    if(type === 'brick') color = PALETTE.brick;
    else if(type === 'question') color = PALETTE.question;
    else if(type === 'hidden') color = 0xFFFFFF; // invisible but placeholder color
    
    const mesh = new THREE.Mesh(geo, mat(color));
    mesh.position.set(x,y,z);
    if(type === 'hidden') mesh.visible = false;
    scene.add(mesh);
    
    const block = {
      mesh: mesh,
      type: type,
      itemType: (type === 'question' || type === 'hidden') ? pickBlockItem() : null,
      baseY: y,
      hitTimer: 0,
      active: true,
      minX:x-0.5, maxX:x+0.5,
      minZ:z-0.5, maxZ:z+0.5,
      topY: y+0.5, bottomY: y-0.5,
      w:1, h:1, d:1
    };
    blocks.push(block);
    platforms.push(block); // Add to platforms for collision
    return block;
  }

  function addCoin(x,y,z){
    const g = new THREE.Group();
    const torus = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.45,0.12,10), mat(PALETTE.coin));
    torus.rotation.x = Math.PI/2;
    g.add(torus);
    g.position.set(x,y,z);
    scene.add(g);
    coins.push({ mesh:g, collected:false, baseY:y, phase: Math.random()*Math.PI*2 });
  }

  function makeEnemyMesh(){
    const g = new THREE.Group();
    const body = new THREE.Mesh(new THREE.SphereGeometry(0.5,8,6), mat(PALETTE.enemyBody));
    body.scale.set(1,0.85,1);
    body.position.y = 0.5;
    g.add(body);
    const browL = new THREE.Mesh(new THREE.BoxGeometry(0.22,0.08,0.05), mat(PALETTE.enemyDark));
    browL.position.set(-0.16,0.66,0.42);
    browL.rotation.z = 0.3;
    g.add(browL);
    const browR = browL.clone(); browR.position.x = 0.16; browR.rotation.z = -0.3;
    g.add(browR);
    const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.12,0.05), mat(0xFCFCFC));
    eyeL.position.set(-0.16,0.55,0.44);
    g.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = 0.16;
    g.add(eyeR);
    const footL = new THREE.Mesh(new THREE.BoxGeometry(0.24,0.18,0.3), mat(PALETTE.enemyFoot));
    footL.position.set(-0.22,0.09,0);
    g.add(footL);
    const footR = footL.clone(); footR.position.x = 0.22;
    g.add(footR);
    return g;
  }

  function makeTurtleMesh(){
    const g = new THREE.Group();
    const shell = new THREE.Mesh(new THREE.SphereGeometry(0.42,10,8,0,Math.PI*2,0,Math.PI/1.6), mat(PALETTE.turtleShell));
    shell.position.y = 0.4;
    shell.userData.part = 'shell';
    g.add(shell);
    for(let i=-1;i<=1;i++){
      const ridge = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.32,0.07), mat(PALETTE.turtleShellDark));
      ridge.position.set(i*0.17, 0.55, 0.16);
      ridge.rotation.x = -0.4;
      ridge.userData.part = 'shell';
      g.add(ridge);
    }
    const belly = new THREE.Mesh(new THREE.BoxGeometry(0.5,0.3,0.5), mat(PALETTE.turtleBelly));
    belly.position.y = 0.22;
    belly.userData.part = 'shell';
    g.add(belly);
    const head = new THREE.Mesh(new THREE.SphereGeometry(0.2,8,6), mat(PALETTE.turtleSkin));
    head.position.set(0, 0.4, 0.4);
    head.userData.part = 'head';
    g.add(head);
    const eyeGeo = new THREE.BoxGeometry(0.06,0.06,0.03);
    const eyeMatWhite = mat(0xFCFCFC);
    const eyeL = new THREE.Mesh(eyeGeo, eyeMatWhite);
    eyeL.position.set(-0.08,0.46,0.56);
    eyeL.userData.part = 'head';
    g.add(eyeL);
    const eyeR = eyeL.clone(); eyeR.position.x = 0.08; eyeR.userData.part='head'; g.add(eyeR);
    const footGeo = new THREE.BoxGeometry(0.15,0.13,0.18);
    const footMat = mat(PALETTE.turtleSkin);
    const footFL = new THREE.Mesh(footGeo, footMat);
    footFL.position.set(-0.24,0.07,0.26); footFL.userData.part='foot'; g.add(footFL);
    const footFR = footFL.clone(); footFR.position.x = 0.24; footFR.userData.part='foot'; g.add(footFR);
    const footBL = footFL.clone(); footBL.position.z = -0.26; footBL.userData.part='foot'; g.add(footBL);
    const footBR = footFR.clone(); footBR.position.z = -0.26; footBR.userData.part='foot'; g.add(footBR);
    return g;
  }

  // shows/hides the head & feet so a turtle can visually retract into just its shell
  function setTurtleWalking(mesh, walking){
    mesh.traverse(child=>{
      if(child.userData && (child.userData.part === 'head' || child.userData.part === 'foot')){
        child.visible = walking;
      }
    });
    mesh.scale.y = walking ? 1 : 0.82;
  }

  function addEnemy(x,y,z, rangeAxis, rangeMin, rangeMax, kind){
    kind = kind || 'goomba';
    const mesh = (kind === 'turtle') ? makeTurtleMesh() : makeEnemyMesh();
    mesh.position.set(x,y,z);
    scene.add(mesh);
    enemies.push({
      mesh:mesh, alive:true, kind:kind, axis:rangeAxis, min:rangeMin, max:rangeMax,
      dir: Math.random()<0.5?1:-1, speed: 0.02 + Math.random()*0.015, baseY:y,
      turtleState: 'walk', slideTimer: 0
    });
  }

  function makeMushroomMesh(capColor){
    const g = new THREE.Group();
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.24,0.28,0.4,8), mat(PALETTE.mushroomStem));
    stem.position.y = 0.2;
    g.add(stem);
    const cap = new THREE.Mesh(new THREE.SphereGeometry(0.42,10,8,0,Math.PI*2,0,Math.PI/1.8), mat(capColor));
    cap.position.y = 0.42;
    g.add(cap);
    const spotGeo = new THREE.SphereGeometry(0.08,6,5);
    const spotMat = mat(PALETTE.mushroomSpot);
    const spotPositions = [[0,0.62,0.32],[0.28,0.58,-0.1],[-0.28,0.58,-0.1]];
    spotPositions.forEach(p=>{

  function addItem(type, x, y, z){

  // dispenses whatever a question block contains: coin, or a real collectible item that pops out
  function dispenseBlockItem(block){
    const type = block.itemType || 'coin';
    const pos = block.mesh.position;
    if(type === 'coin'){
      state.coins += 1;
      state.score += 100;
      playCoinSound();
      const vCoin = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.4,0.1,10), mat(PALETTE.coin));
      vCoin.rotation.x = Math.PI/2;
      vCoin.position.copy(pos);
      scene.add(vCoin);
      let vTimer = 0;
      const animCoin = ()=>{
        vTimer++;
        vCoin.position.y += 0.15 - vTimer*0.01;
        vCoin.rotation.y += 0.2;
        if(vTimer < 30) requestAnimationFrame(animCoin);
        else scene.remove(vCoin);
      };
      animCoin();
    } else {
      addItem(type, pos.x, pos.y + 1.0, pos.z);
      state.score += 50;
      playCoinSound();
    }
    updateHud();
  }

  function buildStage(stageIdx){
    clearLevel();
    const theme = STAGE_THEMES[stageIdx];
    const diff = STAGE_DIFFICULTY[stageIdx];
    applyTheme(theme);

    levelStartZ = 6;
    addPlatform(0, 0, levelStartZ, 8, 1, 8, theme.ground, theme.groundSide);

    let curX = 0, curZ = levelStartZ, curY = 0;
    for(let i=0;i<diff.segCount;i++){
      const stepZ = 6 + Math.random()*2.5;
      const stepX = (Math.random()-0.5)*7;
      const stepY = (Math.random()<0.4) ? (Math.random()<0.5? (2+Math.random()*1.5): -(2+Math.random()*1.5)) : 0;
      curZ -= stepZ;
      curX = Math.max(-15, Math.min(15, curX + stepX));
      curY = Math.max(diff.heightMin, Math.min(diff.heightMax, curY + stepY));
      const w = diff.widthMin + Math.random()*3;
      const d = 4 + Math.random()*2;
      addPlatform(curX, curY, curZ, w, 1, d, theme.ground, theme.groundSide);

      // Block generation probabilities
      const BLOCK_CHANCE = 0.45;      // Overall chance for a block to appear on a segment
      const QUESTION_RATIO = 0.5;    // 50% of blocks are question blocks
      const BRICK_RATIO = 0.4;       // 40% of blocks are brick blocks
      const HIDDEN_RATIO = 0.1;      // 10% of blocks are hidden blocks

      if(Math.random() < BLOCK_CHANCE){
        const bx = curX + (Math.random()-0.5)*2.5;
        const bz = curZ + (Math.random()-0.5)*2.5;
        const r = Math.random();
        if(r < QUESTION_RATIO) addBlock(bx, curY + 3.5, bz, 'question');
        else if(r < QUESTION_RATIO + BRICK_RATIO) addBlock(bx, curY + 3.5, bz, 'brick');
        else addBlock(bx, curY + 3.5, bz, 'hidden');
      } else if(Math.random() < 0.3){
        addCoin(curX + (Math.random()-0.5)*1.5, curY + 2.2, curZ + (Math.random()-0.5)*1.5);
      }
      if(Math.random() < 0.28){
        addCoin(curX + (Math.random()-0.5)*2, curY + 1.2, curZ + (Math.random()-0.5)*2 - 2);
      }
      // enemies: only on wide-enough platforms, not the first couple of segments
      if(i > 1 && w >= 4.2 && Math.random() < diff.enemyChance){
        const margin = w/2 - 0.8;
        const kind = Math.random() < 0.4 ? 'turtle' : 'goomba';
        addEnemy(curX, curY+0.5, curZ, 'x', curX-margin, curX+margin, kind);
      }
      // power-up items: mushroom (common-ish), star (rare), shell (rare), 1-up (rarest)
      if(i > 0 && Math.random() < 0.16){
        addItem('mushroom', curX + (Math.random()-0.5)*1.2, curY + 1.1, curZ + (Math.random()-0.5)*1.2);
      } else if(i > 2 && Math.random() < 0.07){
        addItem('star', curX + (Math.random()-0.5)*1.2, curY + 1.1, curZ + (Math.random()-0.5)*1.2);
      } else if(i > 2 && Math.random() < 0.06){
        addItem('shell', curX + (Math.random()-0.5)*1.2, curY + 1.1, curZ + (Math.random()-0.5)*1.2);
      } else if(i > 2 && Math.random() < 0.045){
        addItem('oneup', curX + (Math.random()-0.5)*1.2, curY + 1.1, curZ + (Math.random()-0.5)*1.2);
      }
    }

    const goalZ = curZ - 8;
    addPlatform(curX, curY, goalZ, 10, 1, 10, theme.block, theme.blockDark);
    poleGroup = new THREE.Group();
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.15,8,6), mat(PALETTE.flagPole));
    pole.position.y = 4;
    poleGroup.add(pole);

    flag.position.set(0.9, 7, 0);
    poleGroup.add(flag);
    poleGroup.position.set(curX, curY + 0.5, goalZ);
    scene.add(poleGroup);
    goalPos = { x: curX, y: curY, z: goalZ };

    return { startPos: new THREE.Vector3(0, 1, levelStartZ) };
  }

  // ============ PLAYER (voxel Mario-ish) ============

  // ============ PHYSICS / GAME STATE ============

  // ============ FREE CAMERA (pointer drag / touch) ============
  const camState = { yaw:0, pitch:0.4, radius:7.5 };
  const cameraPointers = new Map();
  let pinchStartDist = null;
  let pinchStartRadius = null;

  function distBetween(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

  function onCamPointerDown(e){
    cameraPointers.set(e.pointerId, {x:e.clientX,y:e.clientY});
    if(cameraPointers.size === 2){
      const pts = Array.from(cameraPointers.values());
      pinchStartDist = distBetween(pts[0],pts[1]);
      pinchStartRadius = camState.radius;
    }
  }
  function onCamPointerMove(e){
    if(!cameraPointers.has(e.pointerId)) return;
    const prev = cameraPointers.get(e.pointerId);
    const cur = {x:e.clientX,y:e.clientY};
    if(cameraPointers.size === 1){
      const dx = cur.x - prev.x, dy = cur.y - prev.y;
      camState.yaw -= dx * 0.006;
      camState.pitch = Math.max(0.08, Math.min(1.3, camState.pitch - dy*0.006));
    }
    cameraPointers.set(e.pointerId, cur);
    if(cameraPointers.size === 2 && pinchStartDist){
      const pts = Array.from(cameraPointers.values());
      const d = distBetween(pts[0],pts[1]);
      const delta = d - pinchStartDist;
      camState.radius = Math.max(4, Math.min(16, pinchStartRadius - delta*0.03));
    }
  }
  function onCamPointerUp(e){
    cameraPointers.delete(e.pointerId);
    if(cameraPointers.size < 2){ pinchStartDist = null; pinchStartRadius = null; }
  }

  canvas.addEventListener('pointerdown', onCamPointerDown);
  window.addEventListener('pointermove', onCamPointerMove);
  window.addEventListener('pointerup', onCamPointerUp);
  window.addEventListener('pointercancel', onCamPointerUp);
  window.addEventListener('wheel', e=>{
    e.preventDefault();
    camState.radius = Math.max(4, Math.min(16, camState.radius + e.deltaY*0.01));
  }, {passive:false});

  // ============ TOUCH CONTROLS (joystick + jump + fire) ============
  const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  const touchControls = document.getElementById('touchControls');
  const joystickBase = document.getElementById('joystickBase');
  const joystickStick = document.getElementById('joystickStick');
  const jumpBtn = document.getElementById('jumpBtn');
  const fireBtn = document.getElementById('fireBtn');
  if(isTouchDevice){ touchControls.style.display = 'block'; }

  const joystick = { active:false, id:null, x:0, y:0 };
  const JOY_RADIUS = 42;

  joystickBase.addEventListener('pointerdown', e=>{
    e.stopPropagation();
    joystick.active = true; joystick.id = e.pointerId;
    updateJoystickFromEvent(e);
    joystickBase.setPointerCapture(e.pointerId);
  });
  joystickBase.addEventListener('pointermove', e=>{
    if(joystick.active && e.pointerId === joystick.id){
      e.stopPropagation();
      updateJoystickFromEvent(e);
    }
  });
  function endJoystick(e){
    if(joystick.id === e.pointerId){
      joystick.active = false; joystick.id = null; joystick.x = 0; joystick.y = 0;
      joystickStick.style.transform = 'translate(0px,0px)';
    }
  }
  joystickBase.addEventListener('pointerup', e=>{ e.stopPropagation(); endJoystick(e); });
  joystickBase.addEventListener('pointercancel', e=>{ e.stopPropagation(); endJoystick(e); });

  function updateJoystickFromEvent(e){
    const rect = joystickBase.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    let dx = e.clientX - cx, dy = e.clientY - cy;
    const dist = Math.hypot(dx,dy);
    if(dist > JOY_RADIUS){ dx = dx/dist*JOY_RADIUS; dy = dy/dist*JOY_RADIUS; }
    joystick.x = dx / JOY_RADIUS;
    joystick.y = dy / JOY_RADIUS;
    joystickStick.style.transform = `translate(${dx}px,${dy}px)`;
  }

  jumpBtn.addEventListener('pointerleave', e=>{ touchJump = false; });

  let audioCtx;
  function beep(freq1, freq2, dur, vol){
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(freq1, audioCtx.currentTime);
      if(freq2) o.frequency.setValueAtTime(freq2, audioCtx.currentTime+dur*0.4);
      g.gain.setValueAtTime(vol, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime+dur);
    }catch(e){}
  }
  const playCoinSound = ()=>beep(988,1568,0.25,0.08);
  const playJumpSound = ()=>beep(320,650,0.18,0.06);
  const playStompSound = ()=>beep(200,80,0.2,0.09);

  // Generic menu renderer: shows arbitrary HTML plus a stack of buttons.
  // buttons: [{ label, className (optional), onClick }]
  function showMenu(html, buttons){
    overlay.innerHTML = html + '<div class="menuBtnRow"></div>';
    const row = overlay.querySelector('.menuBtnRow');

      const btn = document.createElement('button');
      btn.className = 'menuBtn' + (b.className ? ' ' + b.className : '');

      // Use both click and pointerdown to ensure responsiveness
      const handler = (e)=>{ 
        e.preventDefault();
        e.stopPropagation();
        e.target.blur(); 
        b.onClick(); 
      };
      btn.addEventListener('click', handler);

    });

  function handleBlockHit(block){
    if(!block.active && block.type !== 'brick') return;
    
    if(block.type === 'hidden'){

      block.mesh.material.color.setHex(PALETTE.question);

        { label: 'つづける', onClick: resumeGame },
        { label: 'このステージを最初から', className:'secondary', onClick: restartStage },
        { label: 'メインメニューへ戻る', className:'tertiary', onClick: showTitleScreen }
      ]
    );
  }

  function resumeGame(){
    if(!state.paused) return;
    overlay.style.display = 'none';
    state.paused = false;
    state.running = true;
    pauseBtnEl.style.display = 'flex';
  }

  function restartStage(){
    overlay.style.display = 'none';
    state.paused = false;
    resetPlayerToCheckpoint();
    updateHud();
    pauseBtnEl.style.display = 'flex';
    state.running = true;
  }

  pauseBtnEl.addEventListener('click', (e)=>{ e.target.blur(); pauseGame(); });
  window.addEventListener('keydown', e=>{
    if(e.code === 'Escape' || e.code === 'KeyP'){
      e.preventDefault();
      if(state.running && !state.paused) pauseGame();
      else if(state.paused) resumeGame();
    }
  }, {passive:false});

  showTitleScreen();

  function flashScreen(){
    fadeFlash.style.transition = 'none';
    fadeFlash.style.opacity = '0.8';
    requestAnimationFrame(()=>{
      fadeFlash.style.transition = 'opacity 0.5s';
      fadeFlash.style.opacity = '0';
    });
  }

  function showBanner(text){
    stageBanner.textContent = text;
    stageBanner.style.opacity = '1';
    setTimeout(()=>{ stageBanner.style.opacity = '0'; }, 1500);
  }

  function loseLife(){
    state.lives -= 1;
    state.big = false;
    state.fire = false;
    state.starTimer = 0;
    player.scale.set(1,1,1);
    applyPlayerAppearance();
    starColorParts.forEach((p,i)=>{ p.material.color.setHex(starOriginalColors[i]); });
    flashScreen();
    playHurtSound();
    if(state.lives <= 0){
      state.running = false;
      state.paused = false;
      pauseBtnEl.style.display = 'none';
      showMenu(
        `<h2 style="color:#E40000;text-shadow:4px 4px 0 #5c0000;">GAME OVER</h2>
         <p>スコア: ${String(state.score).padStart(6,'0')}<br>集めたコイン: ${state.coins}<br>到達ステージ: ${state.stageIndex+1}</p>`,
        [
          { label: 'もう一度あそぶ', onClick: startGame },
          { label: 'メインメニューへ戻る', className:'tertiary', onClick: showTitleScreen }
        ]
      );
      hud.style.display = 'none';
      controlsHint.style.display = 'none';
    } else {
      resetPlayerToCheckpoint();
      updateHud();
    }
  }

  function nextStageOrWin(){
    state.running = false;
    if(state.stageIndex < TOTAL_STAGES - 1){
      showBanner('STAGE ' + (state.stageIndex+1) + ' CLEAR!');
      setTimeout(()=>{
        loadStage(state.stageIndex + 1);
        state.running = true;
      }, 1700);
    } else {
      pauseBtnEl.style.display = 'none';
      showMenu(
        `<h2>ALL CLEAR !!</h2>
         <p>全ステージクリア！<br>スコア: ${String(state.score).padStart(6,'0')}<br>集めたコイン: ${state.coins}</p>`,
        [
          { label: 'もう一度あそぶ', onClick: startGame },
          { label: 'メインメニューへ戻る', className:'tertiary', onClick: showTitleScreen }
        ]
      );
      hud.style.display = 'none';
      controlsHint.style.display = 'none';
    }
  }

  function spawnFireball(){
    const dirX = Math.sin(state.facing), dirZ = Math.cos(state.facing);
    const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.22,8,6), new THREE.MeshBasicMaterial({ color: PALETTE.fireballColor }));
    mesh.position.set(state.pos.x + dirX*0.6, state.pos.y + 0.9, state.pos.z + dirZ*0.6);
    scene.add(mesh);
    fireballs.push({ mesh:mesh, vx:dirX*0.28, vz:dirZ*0.28, vy:0.04, life:150, bounces:0 });
    playFireSound();
  }

  // ============ MAIN LOOP ============
  let jumpHeld = false;
  let fireHeld = false;
  let bobPhase = 0;
  let lastCheckpointZ = 6;

  function findSupport(px, py, pz){
    let best = null;
    // generous margins so near-miss jumps/landings on platform edges still count
    for(const p of platforms){
      if(px >= p.minX - 0.5 && px <= p.maxX + 0.5 && pz >= p.minZ - 0.5 && pz <= p.maxZ + 0.5){
        if(py >= p.topY - 0.9){
          if(best === null || p.topY > best) best = p.topY;
        }
      }
    }
    return best;
  }

  // jump forgiveness: a short grace window after walking off a ledge (coyote time),
  // and a short window where an early jump press still fires once you land (jump buffer)
  const COYOTE_FRAMES = 9;
  const JUMP_BUFFER_FRAMES = 9;
  let coyoteTimer = 0;
  let jumpBufferTimer = 0;

  function update(){
    if(!state.running) return;

    // ---- camera-relative movement input ----
    let inputForward = 0, inputRight = 0;
    if(isDown('ArrowUp','KeyW')) inputForward += 1;
    if(isDown('ArrowDown','KeyS')) inputForward -= 1;
    if(isDown('ArrowLeft','KeyA')) inputRight -= 1;
    if(isDown('ArrowRight','KeyD')) inputRight += 1;
    if(joystick.active){
      inputForward += -joystick.y;
      inputRight += joystick.x;
    }
    inputForward = Math.max(-1, Math.min(1, inputForward));
    inputRight = Math.max(-1, Math.min(1, inputRight));

    const fx = -Math.sin(camState.yaw), fz = -Math.cos(camState.yaw);
    const rx = Math.cos(camState.yaw), rz = -Math.sin(camState.yaw);

    let worldX = fx*inputForward + rx*inputRight;
    let worldZ = fz*inputForward + rz*inputRight;
    const moveLen = Math.hypot(worldX, worldZ);
    const moving = moveLen > 0.05;
    if(moving){
      worldX /= moveLen; worldZ /= moveLen;
      state.pos.x += worldX * MOVE_SPEED;
      state.pos.z += worldZ * MOVE_SPEED;
      state.facing = Math.atan2(worldX, worldZ);
      bobPhase += 0.25;
    }

    // ---- jump (with coyote time + jump buffering for a forgiving feel) ----
    const jumpPressed = isDown('Space') || touchJump;
    const jumpJustPressed = jumpPressed && !jumpHeld;
    jumpHeld = jumpPressed;

    if(state.onGround) coyoteTimer = COYOTE_FRAMES;
    else if(coyoteTimer > 0) coyoteTimer--;

    if(jumpJustPressed) jumpBufferTimer = JUMP_BUFFER_FRAMES;
    else if(jumpBufferTimer > 0) jumpBufferTimer--;

    if(jumpBufferTimer > 0 && coyoteTimer > 0){
      state.vel.y = JUMP_VELOCITY;
      state.onGround = false;
      coyoteTimer = 0;
      jumpBufferTimer = 0;
      playJumpSound();
    }

    // ---- fire (shoot a fireball while in fire form) ----
    const firePressed = isDown('KeyF') || touchFire;
    const fireJustPressed = firePressed && !fireHeld;
    fireHeld = firePressed;
    if(fireJustPressed && state.fire && fireballs.length < 4){
      spawnFireball();
    }
    if(fireBtn) fireBtn.style.opacity = state.fire ? '1' : '0.35';

    // ---- gravity ----
    state.vel.y += GRAVITY;
    state.pos.y += state.vel.y;

    // Head collision check (hitting blocks from below)
    if(state.vel.y > 0){
      for(const p of platforms){
        if(p.type !== 'solid' && state.pos.x >= p.minX - 0.4 && state.pos.x <= p.maxX + 0.4 && state.pos.z >= p.minZ - 0.4 && state.pos.z <= p.maxZ + 0.4){
          const headY = state.pos.y + (state.big ? 1.8 : 1.6);
          if(headY >= p.bottomY && headY <= p.topY){
            // Hit block!
            state.pos.y = p.bottomY - (state.big ? 1.8 : 1.6);
            state.vel.y = 0;
            if(p.mesh && blocks.includes(p)){
              handleBlockHit(p);
            }
            break;
          }
        }
      }
    }

    const support = findSupport(state.pos.x, state.pos.y, state.pos.z);
    if(support !== null && state.pos.y <= support + 0.22 && state.vel.y <= 0){
      state.pos.y = support;
      state.vel.y = 0;
      state.onGround = true;
      if(state.pos.z < lastCheckpointZ - 3){
        lastCheckpointZ = state.pos.z;
        state.lastCheckpoint.set(state.pos.x, state.pos.y + 1, state.pos.z);
      }
    } else {
      state.onGround = false;
    }

    // Update blocks hit animation
    for(const b of blocks){
      if(b.hitTimer > 0){
        b.hitTimer--;
        b.mesh.position.y = b.baseY + Math.sin(b.hitTimer * 0.4) * 0.2;
        if(b.hitTimer === 0) b.mesh.position.y = b.baseY;
      }
    }

    if(state.pos.y < -14){
      loseLife();
      return;
    }

    if(state.invuln > 0) state.invuln--;

    if(state.starTimer > 0){
      state.starTimer--;
      const hue = (performance.now()*0.002) % 1;
      starColorParts.forEach((p,i)=>{
        p.material.color.setHSL((hue + i*0.06) % 1, 0.85, 0.6);
      });
      if(state.starTimer === 0){
        starColorParts.forEach((p,i)=>{ p.material.color.setHex(starOriginalColors[i]); });
      }
    }
    if(statusVal){
      if(state.starTimer > 0) statusVal.textContent = '★ STAR ' + Math.ceil(state.starTimer/60) + 's';
      else if(state.fire) statusVal.textContent = '🔥 FIRE';
      else if(state.shellShield && state.big) statusVal.textContent = '● BIG 🛡';
      else if(state.shellShield) statusVal.textContent = '🛡 SHELL';
      else if(state.big) statusVal.textContent = '● BIG';
      else statusVal.textContent = '';
    }

    // ---- update player mesh ----
    player.position.copy(state.pos);
    player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, state.facing, 0.25);
    const walkBob = moving ? Math.sin(bobPhase)*0.15 : 0;
    legL.rotation.x = walkBob;
    legR.rotation.x = -walkBob;
    armL.rotation.x = -walkBob;
    armR.rotation.x = walkBob;
    player.visible = !(state.invuln > 0 && Math.floor(state.invuln/4)%2===0);

    // ---- coins ----
    for(const c of coins){
      if(c.collected) continue;
      c.mesh.rotation.y += 0.08;
      c.mesh.position.y = c.baseY + Math.sin(performance.now()*0.003 + c.phase)*0.15;
      const dx = c.mesh.position.x - state.pos.x;
      const dy = c.baseY - (state.pos.y+0.7);
      const dz = c.mesh.position.z - state.pos.z;
      if(Math.abs(dx) < 0.7 && Math.abs(dy) < 0.9 && Math.abs(dz) < 0.7){
        c.collected = true;
        c.mesh.visible = false;
        state.coins += 1;
        state.score += 100;
        updateHud();
        playCoinSound();
      }
    }

    // ---- enemies ----
    for(const en of enemies){
      if(!en.alive) continue;
      const p = en.mesh.position;

      if(en.kind === 'turtle' && en.turtleState === 'idle'){
        // retracted shell just sits still until kicked or destroyed
      } else if(en.kind === 'turtle' && en.turtleState === 'sliding'){
        const extMin = en.min - 6, extMax = en.max + 6;
        if(en.axis === 'x'){
          p.x += en.dir * SHELL_KICK_SPEED;
          if(p.x <= extMin || p.x >= extMax){ p.x = Math.max(extMin, Math.min(extMax, p.x)); en.turtleState = 'idle'; }
        } else {
          p.z += en.dir * SHELL_KICK_SPEED;
          if(p.z <= extMin || p.z >= extMax){ p.z = Math.max(extMin, Math.min(extMax, p.z)); en.turtleState = 'idle'; }
        }
        en.slideTimer--;
        if(en.slideTimer <= 0) en.turtleState = 'idle';
        // a rolling shell smashes any question block it barrels into
        for(const b of blocks){
          if(b.type === 'question' &&
             Math.abs(p.x - b.mesh.position.x) < 0.9 &&
             Math.abs(p.z - b.mesh.position.z) < 0.9 &&
             Math.abs((p.y+0.4) - b.mesh.position.y) < 0.9){
            shellHitBlock(b);
          }
        }
      } else {
        if(en.axis === 'x'){
          p.x += en.dir * en.speed;
          if(p.x < en.min || p.x > en.max) en.dir *= -1;
        } else {
          p.z += en.dir * en.speed;
          if(p.z < en.min || p.z > en.max) en.dir *= -1;
        }
      }
      en.mesh.rotation.y += en.dir * (en.turtleState === 'sliding' ? 0.14 : 0.03);

      const dx = p.x - state.pos.x;
      const dz = p.z - state.pos.z;
      const dy = (p.y+0.5) - (state.pos.y+0.6);
      if(Math.abs(dx) < 0.65 && Math.abs(dz) < 0.65 && Math.abs(dy) < 0.75 && state.invuln === 0){
        const playerBottom = state.pos.y;
        const isStomp = state.vel.y < 0 && playerBottom > p.y + 0.25;

        if(state.starTimer > 0){
          // invincible star: defeat enemy on any contact
          en.alive = false;
          en.mesh.visible = false;
          state.score += 200;
          updateHud();
          playStompSound();
        } else if(en.kind === 'turtle' && en.turtleState === 'walk' && isStomp){
          // stomp a walking turtle: it retracts into its shell and immediately rolls away
          en.turtleState = 'sliding';
          setTurtleWalking(en.mesh, false);
          en.slideTimer = SHELL_SLIDE_FRAMES;
          en.dir = (en.axis === 'x') ? Math.sign(dx || 1) : Math.sign(dz || 1);
          state.vel.y = STOMP_BOUNCE;
          state.score += 200;
          updateHud();
          playStompSound();
        } else if(en.kind === 'turtle' && en.turtleState === 'idle' && isStomp){
          // stomp an idle shell: destroy it for a bonus
          en.alive = false;
          en.mesh.visible = false;
          state.vel.y = STOMP_BOUNCE;
          state.score += 300;
          updateHud();
          playStompSound();
        } else if(en.kind === 'turtle' && en.turtleState === 'sliding' && isStomp){
          // stomp a sliding shell: stop it in its tracks
          en.turtleState = 'idle';
          en.dir = 0;
          state.vel.y = STOMP_BOUNCE;
          state.score += 150;
          updateHud();
          playStompSound();
        } else if(en.kind === 'turtle' && en.turtleState === 'idle' && !isStomp){
          // kick an idle shell away from the player
          en.turtleState = 'sliding';
          en.slideTimer = SHELL_SLIDE_FRAMES;
          en.dir = (en.axis === 'x') ? Math.sign(dx || 1) : Math.sign(dz || 1);
          state.invuln = 30;
          playStompSound();
        } else if(en.kind === 'goomba' && isStomp){
          // stomp
          en.alive = false;
          en.mesh.visible = false;
          state.vel.y = STOMP_BOUNCE;
          state.score += 200;
          updateHud();
          playStompSound();
        } else if(state.fire){
          // lose fire power only, stay big
          state.fire = false;
          applyPlayerAppearance();
          state.invuln = 90;
          flashScreen();
          playHurtSound();
        } else if(state.big){
          // shrink instead of losing a life
          state.big = false;
          player.scale.set(1,1,1);
          state.invuln = 90;
          flashScreen();
          playHurtSound();
        } else if(state.shellShield){
          // shell item shield absorbs one hit
          state.shellShield = false;
          state.invuln = 90;
          flashScreen();
          playHurtSound();
          updateHud();
        } else {
          // hurt
          state.invuln = 70;
          loseLife();
          return;
        }
      }
    }

    // ---- items ----
    for(const it of items){
      if(it.collected) continue;
      it.mesh.rotation.y += 0.06;
      it.mesh.position.y = it.baseY + Math.sin(performance.now()*0.003 + it.phase)*0.15;
      const dx = it.mesh.position.x - state.pos.x;
      const dy = it.baseY - (state.pos.y+0.7);
      const dz = it.mesh.position.z - state.pos.z;
      if(Math.abs(dx) < 0.75 && Math.abs(dy) < 0.9 && Math.abs(dz) < 0.75){
        it.collected = true;
        it.mesh.visible = false;
        if(it.type === 'mushroom'){
          if(!state.big){
            state.big = true;
            player.scale.set(1.3,1.3,1.3);
          }
          state.score += 200;
        } else if(it.type === 'oneup'){
          state.lives += 1;
          state.score += 500;
        } else if(it.type === 'star'){
          state.starTimer = 600;
          state.score += 200;
        } else if(it.type === 'shell'){
          state.shellShield = true;
          state.score += 250;
        } else if(it.type === 'fireflower'){
          if(!state.big){
            state.big = true;
            player.scale.set(1.3,1.3,1.3);
          }
          state.fire = true;
          applyPlayerAppearance();
          state.score += 300;
        }
        updateHud();
        playCoinSound();
      }
    }

    // ---- fireballs ----
    for(let i = fireballs.length - 1; i >= 0; i--){
      const f = fireballs[i];
      f.vy += GRAVITY * 0.6;
      f.mesh.position.x += f.vx;
      f.mesh.position.z += f.vz;
      f.mesh.position.y += f.vy;
      f.mesh.rotation.x += 0.3;
      f.mesh.rotation.z += 0.2;
      const fsupport = findSupport(f.mesh.position.x, f.mesh.position.y, f.mesh.position.z);
      if(fsupport !== null && f.mesh.position.y <= fsupport + 0.22 && f.vy < 0){
        f.mesh.position.y = fsupport + 0.22;
        f.vy = 0.16;
        f.bounces++;
      }
      f.life--;
      let hitEnemy = false;
      for(const en of enemies){
        if(!en.alive) continue;
        const dx = en.mesh.position.x - f.mesh.position.x;
        const dz = en.mesh.position.z - f.mesh.position.z;
        const dy = (en.mesh.position.y+0.4) - f.mesh.position.y;
        if(Math.abs(dx) < 0.6 && Math.abs(dz) < 0.6 && Math.abs(dy) < 0.7){
          en.alive = false;
          en.mesh.visible = false;
          state.score += 150;
          updateHud();
          playStompSound();
          hitEnemy = true;
          break;
        }
      }
      if(hitEnemy || f.life <= 0 || f.mesh.position.y < -14 || f.bounces > 3){
        scene.remove(f.mesh);
        fireballs.splice(i,1);
      }
    }

    // ---- goal check ----
    const dxg = state.pos.x - goalPos.x, dzg = state.pos.z - goalPos.z;
    if(Math.hypot(dxg,dzg) < 2.5 && state.pos.y < goalPos.y + 3){
      nextStageOrWin();
      return;
    }

    // ---- free camera orbit ----
    const target = new THREE.Vector3(state.pos.x, state.pos.y+1, state.pos.z);
    const cx = target.x + camState.radius * Math.cos(camState.pitch) * Math.sin(camState.yaw);
    const cz = target.z + camState.radius * Math.cos(camState.pitch) * Math.cos(camState.yaw);
    const cy = target.y + 1.2 + camState.radius * Math.sin(camState.pitch);
    camera.position.lerp(new THREE.Vector3(cx,cy,cz), 0.18);
    camera.lookAt(target);

    // starGroup removed as per user request
    if(STAGE_THEMES[state.stageIndex].lava){
      lavaLight.position.set(state.pos.x, state.pos.y-1, state.pos.z);
    }
  }

  function animate(){
    requestAnimationFrame(animate);
    update();
    renderer.render(scene, camera);
  }

  resize();
  buildStage(0);
  state.pos.set(0,1,levelStartZ);
  camera.position.set(0, 4.2, levelStartZ + 7.5);
  camera.lookAt(0,1,levelStartZ);
  updateHud();
  animate();

})();
</script>
</body>
</html>
